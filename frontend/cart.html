<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Twilight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center">
                    <i class="fas fa-gem text-purple-600 text-3xl mr-3"></i>
                    <span class="text-3xl font-bold text-gray-800">Twilight</span>
                </a>
                <div id="userNav"></div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-4xl font-bold text-gray-800 mb-8">Shopping Cart</h1>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div id="cartItems" class="space-y-4">
                    <div class="text-center py-20">
                        <i class="fas fa-spinner fa-spin text-6xl text-purple-600"></i>
                    </div>
                </div>

                <div id="emptyCart" class="hidden bg-white rounded-2xl shadow-lg p-12 text-center">
                    <i class="fas fa-shopping-cart text-6xl text-gray-300 mb-4"></i>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Your cart is empty</h2>
                    <p class="text-gray-600 mb-6">Add some amazing handmade products!</p>
                    <a href="products.html" class="inline-block bg-purple-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-purple-700 transition">
                        Continue Shopping
                    </a>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div id="cartSummary" class="bg-white rounded-2xl shadow-lg p-6 sticky top-24">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Order Summary</h2>
                    
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between text-gray-600">
                            <span>Subtotal</span>
                            <span id="subtotal">$0.00</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Shipping</span>
                            <span class="text-green-600">FREE</span>
                        </div>
                        <div class="border-t pt-4 flex justify-between text-xl font-bold text-gray-800">
                            <span>Total</span>
                            <span id="total">$0.00</span>
                        </div>
                    </div>

                    <a href="checkout.html" id="checkoutBtn" 
                       class="block w-full bg-purple-600 text-white text-center py-4 rounded-full font-semibold hover:bg-purple-700 transition mb-3">
                        Proceed to Checkout
                    </a>
                    
                    <a href="products.html" class="block w-full text-center text-purple-600 py-3 font-medium hover:text-purple-700 transition">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadCart();
        });

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
            }
        }

        async function loadCart() {
            const token = localStorage.getItem('token');
            
            try {
                // Use POST method with proper format
                const formData = new URLSearchParams();
                formData.append('token', token);
                formData.append('action', 'view');
                
                const response = await fetch('/cgi-bin/api.sh?action=cart_handler', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                const data = await response.json();
                console.log('Cart data:', data); // Debug log
                
                if (data.success) {
                    if (data.cart.length === 0) {
                        document.getElementById('cartItems').classList.add('hidden');
                        document.getElementById('emptyCart').classList.remove('hidden');
                        document.getElementById('cartSummary').classList.add('hidden');
                    } else {
                        displayCart(data.cart, data.total);
                    }
                } else {
                    console.error('Cart error:', data.error || 'Unknown error');
                    // Show empty cart if there's an error
                    document.getElementById('cartItems').classList.add('hidden');
                    document.getElementById('emptyCart').classList.remove('hidden');
                    document.getElementById('cartSummary').classList.add('hidden');
                }
            } catch (error) {
                console.error('Error loading cart:', error);
                // Show empty cart on exception
                document.getElementById('cartItems').classList.add('hidden');
                document.getElementById('emptyCart').classList.remove('hidden');
                document.getElementById('cartSummary').classList.add('hidden');
            }
        }

        function displayCart(items, total) {
            const container = document.getElementById('cartItems');
            container.innerHTML = items.map(item => {
                // Handle image path properly
                let imagePath = item.image || '';
                if (imagePath && !imagePath.startsWith('http') && !imagePath.startsWith('images/')) {
                    imagePath = 'images/' + imagePath;
                }
                if (!imagePath) {
                    imagePath = 'https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=200';
                }
                
                return `
                <div class="bg-white rounded-2xl shadow-lg p-6">
                    <div class="flex items-center space-x-6">
                        <img src="${imagePath}" alt="${item.name}" 
                             class="w-24 h-24 object-cover rounded-lg"
                             onerror="this.src='https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=200'">
                        
                        <div class="flex-1">
                            <h3 class="text-xl font-semibold text-gray-800">${item.name}</h3>
                            <p class="text-gray-600 text-sm mt-1">${(item.description || '').substring(0, 80)}${item.description && item.description.length > 80 ? '...' : ''}</p>
                            <p class="text-purple-600 font-bold text-lg mt-2">$${parseFloat(item.price).toFixed(2)}</p>
                        </div>
                        
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center border border-gray-300 rounded-lg">
                                <button onclick="updateQuantity(${item.product_id}, ${item.quantity - 1})" 
                                        class="px-3 py-1 hover:bg-gray-100">
                                    <i class="fas fa-minus"></i>
                                </button>
                                <span class="px-4">${item.quantity}</span>
                                <button onclick="updateQuantity(${item.product_id}, ${item.quantity + 1}, ${item.stock || 999})" 
                                        class="px-3 py-1 hover:bg-gray-100">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                            
                            <button onclick="removeFromCart(${item.product_id})" 
                                    class="text-red-500 hover:text-red-700">
                                <i class="fas fa-trash text-xl"></i>
                            </button>
                        </div>
                        
                        <div class="text-right">
                            <p class="text-lg font-bold text-gray-800">$${parseFloat(item.subtotal || (item.price * item.quantity)).toFixed(2)}</p>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            document.getElementById('subtotal').textContent = `$${parseFloat(total).toFixed(2)}`;
            document.getElementById('total').textContent = `$${parseFloat(total).toFixed(2)}`;
        }

        async function updateQuantity(productId, quantity, maxStock) {
            if (quantity < 1) {
                removeFromCart(productId);
                return;
            }

            if (maxStock && quantity > maxStock) {
                alert(`Only ${maxStock} items available in stock`);
                return;
            }

            const token = localStorage.getItem('token');
            const formData = new URLSearchParams();
            formData.append('token', token);
            formData.append('action', 'update');
            formData.append('product_id', productId);
            formData.append('quantity', quantity);

            try {
                const response = await fetch('/cgi-bin/api.sh?action=cart_handler', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();
                if (data.success) {
                    loadCart();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function removeFromCart(productId) {
            if (!confirm('Remove this item from cart?')) return;

            const token = localStorage.getItem('token');
            const formData = new URLSearchParams();
            formData.append('token', token);
            formData.append('action', 'remove');
            formData.append('product_id', productId);

            try {
                const response = await fetch('/cgi-bin/api.sh?action=cart_handler', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();
                if (data.success) {
                    loadCart();
                    updateCartCount();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
