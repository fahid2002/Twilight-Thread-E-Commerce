<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Twilight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-rose-50 via-purple-50 to-pink-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
                    Twilight
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-purple-600 transition">Home</a>
                    <a href="products.html" class="text-gray-700 hover:text-purple-600 transition">Shop All</a>
                    <a href="key Ring.html" class="text-gray-700 hover:text-purple-600 transition">Key Ring</a>
                    <a href="Doormat.html" class="text-gray-700 hover:text-purple-600 transition">Doormat</a>
                    <a href="Flower.html" class="text-gray-700 hover:text-purple-600 transition">Flower</a></a>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="cart.html" class="relative text-gray-700 hover:text-purple-600 transition">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-pink-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                    </a>
                    <div id="userNav"></div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Product Details -->
    <div class="container mx-auto px-6 py-12">
        <a href="products.html" class="inline-flex items-center text-purple-600 hover:text-purple-700 mb-8 font-semibold">
            <i class="fas fa-arrow-left mr-2"></i> Back to Products
        </a>

        <div id="productDetail" class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="text-center py-20">
                <i class="fas fa-spinner fa-spin text-6xl text-purple-600"></i>
                <p class="mt-4 text-gray-600">Loading product details...</p>
            </div>
        </div>
    </div>

    <footer class="bg-gradient-to-r from-gray-800 to-gray-900 text-white py-12 mt-16">
        <div class="container mx-auto px-6">
            <div class="grid md:grid-cols-4 gap-8">
                <div>
                    <h3 class="text-2xl font-bold mb-4 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Twilight</h3>
                    <p class="text-gray-400">Handmade with love, crafted with care.</p>
                </div>
                <div>
                    <h4 class="font-semibold mb-4">Quick Links</h4>
                    <ul class="space-y-2">
                        <li><a href="index.html" class="text-gray-400 hover:text-purple-400 transition">Home</a></li>
                        <li><a href="products.html" class="text-gray-400 hover:text-purple-400 transition">Shop All</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-semibold mb-4">Customer Service</h4>
                    <ul class="space-y-2">
                        <li><a href="#" class="text-gray-400 hover:text-purple-400 transition">Contact Us</a></li>
                        <li><a href="#" class="text-gray-400 hover:text-purple-400 transition">Shipping Info</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-semibold mb-4">Follow Us</h4>
                    <div class="flex space-x-4">
                        <a href="#" class="text-gray-400 hover:text-purple-400 transition"><i class="fab fa-facebook text-2xl"></i></a>
                        <a href="#" class="text-gray-400 hover:text-purple-400 transition"><i class="fab fa-instagram text-2xl"></i></a>
                        <a href="#" class="text-gray-400 hover:text-purple-400 transition"><i class="fab fa-pinterest text-2xl"></i></a>
                    </div>
                </div>
            </div>
            <div class="border-t border-gray-700 mt-8 pt-8 text-center text-gray-400">
                <p>&copy; 2025 Twilight. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        let currentProduct = null;

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            updateUserNav();
            updateCartCount();
            
            if (productId) {
                loadProductDetail(productId);
            } else {
                window.location.href = 'products.html';
            }
        });

        async function loadProductDetail(productId) {
            try {
                const response = await fetch(`/cgi-bin/api.sh?action=show_products&id=${productId}`);
                const data = await response.json();
                
                if (data.success && data.products.length > 0) {
                    const product = data.products[0];
                    displayProduct(product);
                } else {
                    document.getElementById('productDetail').innerHTML = '<div class="col-span-2 text-center py-20"><h2 class="text-2xl font-bold text-gray-800">Product not found</h2></div>';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayProduct(product) {
            currentProduct = product;
            const container = document.getElementById('productDetail');
            
            // Use the same image path as listing pages
            // If image starts with http, use it directly; otherwise prepend 'images/'
            let productImage = product.image || '';
            if (productImage && !productImage.startsWith('http')) {
                productImage = 'images/' + productImage;
            } else if (!productImage) {
                productImage = 'https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=800&h=600&fit=crop';
            }
            const fallbackImage = 'https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=800&h=600&fit=crop';
            
            container.innerHTML = `
                <div class="grid md:grid-cols-2 gap-12 p-8">
                    <div>
                        <div class="relative rounded-3xl overflow-hidden shadow-2xl bg-gradient-to-br from-purple-100 to-pink-100">
                            <img src="${productImage}" alt="${product.name}" 
                                 class="w-full h-auto object-cover"
                                 onerror="this.src='${fallbackImage}'">
                        </div>
                    </div>
                    
                    <div class="space-y-6">
                        <div>
                            <span class="inline-block bg-gradient-to-r from-purple-100 to-pink-100 text-purple-700 px-4 py-2 rounded-full text-sm font-semibold mb-4">
                                <i class="fas fa-tag mr-1"></i> ${product.category || 'Handmade'}
                            </span>
                            <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-4">${product.name}</h1>
                            <div class="flex items-center space-x-4 mb-6">
                                <span class="text-5xl font-bold text-purple-600">$${parseFloat(product.price).toFixed(2)}</span>
                                ${product.stock < 5 && product.stock > 0 ? 
                                    `<span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-sm font-semibold animate-pulse">Only ${product.stock} left!</span>` : 
                                    product.stock === 0 ? 
                                    '<span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-sm font-semibold">Out of Stock</span>' : 
                                    '<span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-sm font-semibold"><i class="fas fa-check-circle mr-1"></i>In Stock</span>'}
                            </div>
                        </div>
                        
                        <div class="border-t border-b border-gray-200 py-6">
                            <h3 class="text-xl font-semibold text-gray-800 mb-3"><i class="fas fa-info-circle text-purple-600 mr-2"></i>Description</h3>
                            <p class="text-gray-600 leading-relaxed">${product.description || 'Beautiful handcrafted product made with love and attention to detail.'}</p>
                        </div>
                        
                        <div class="space-y-4">
                            <div class="flex items-center space-x-4">
                                <label class="text-gray-700 font-medium">Quantity:</label>
                                <div class="flex items-center border-2 border-purple-300 rounded-xl overflow-hidden">
                                    <button onclick="decreaseQty()" class="px-5 py-3 bg-purple-50 hover:bg-purple-100 transition">
                                        <i class="fas fa-minus text-purple-600"></i>
                                    </button>
                                    <input type="number" id="quantity" value="1" min="1" max="${product.stock}" 
                                           class="w-16 text-center py-3 focus:outline-none font-semibold text-gray-800">
                                    <button onclick="increaseQty(${product.stock})" class="px-5 py-3 bg-purple-50 hover:bg-purple-100 transition">
                                        <i class="fas fa-plus text-purple-600"></i>
                                    </button>
                                </div>
                            </div>
                            
                            ${product.stock > 0 ? `
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="addToCart(${product.id})" 
                                        class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-4 rounded-xl font-semibold text-lg hover:shadow-lg transition transform hover:scale-105 flex items-center justify-center space-x-2">
                                    <i class="fas fa-shopping-cart"></i>
                                    <span>Add to Cart</span>
                                </button>
                                <button onclick="buyNow(${product.id})" 
                                        class="bg-gradient-to-r from-pink-600 to-rose-600 text-white px-8 py-4 rounded-xl font-semibold text-lg hover:shadow-lg transition transform hover:scale-105 flex items-center justify-center space-x-2">
                                    <i class="fas fa-bolt"></i>
                                    <span>Buy Now</span>
                                </button>
                            </div>
                            ` : `
                            <button disabled 
                                    class="w-full bg-gray-400 text-white px-8 py-4 rounded-xl font-semibold text-lg cursor-not-allowed">
                                Out of Stock
                            </button>
                            `}
                            
                            <button class="w-full border-2 border-purple-600 text-purple-600 px-8 py-4 rounded-xl font-semibold text-lg hover:bg-purple-50 transition">
                                <i class="fas fa-heart mr-2"></i> Add to Wishlist
                            </button>
                        </div>
                        
                        <div class="bg-gradient-to-br from-purple-50 to-pink-50 rounded-2xl p-6 space-y-3 border-2 border-purple-100">
                            <div class="flex items-center text-gray-700">
                                <i class="fas fa-check-circle text-purple-600 mr-3 text-xl"></i>
                                <span class="font-medium">100% Handmade with Love</span>
                            </div>
                            <div class="flex items-center text-gray-700">
                                <i class="fas fa-check-circle text-purple-600 mr-3 text-xl"></i>
                                <span class="font-medium">Quality Guaranteed</span>
                            </div>
                            <div class="flex items-center text-gray-700">
                                <i class="fas fa-check-circle text-purple-600 mr-3 text-xl"></i>
                                <span class="font-medium">Fast & Secure Shipping</span>
                            </div>
                            <div class="flex items-center text-gray-700">
                                <i class="fas fa-check-circle text-purple-600 mr-3 text-xl"></i>
                                <span class="font-medium">Easy Returns within 30 Days</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function decreaseQty() {
            const input = document.getElementById('quantity');
            if (input.value > 1) {
                input.value = parseInt(input.value) - 1;
            }
        }

        function increaseQty(max) {
            const input = document.getElementById('quantity');
            if (input.value < max) {
                input.value = parseInt(input.value) + 1;
            }
        }

        async function buyNow(productId) {
            const quantity = parseInt(document.getElementById('quantity').value);
            
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Please login to buy products');
                window.location.href = 'login.html';
                return;
            }

            if (!currentProduct) {
                alert('Product information not loaded');
                return;
            }

            // Validate quantity
            if (quantity < 1 || quantity > currentProduct.stock) {
                alert(`Please select a valid quantity (1-${currentProduct.stock})`);
                return;
            }

            // Create order directly
            try {
                const formData = new URLSearchParams();
                formData.append('token', token);
                formData.append('product_id', productId);
                formData.append('quantity', quantity);
                formData.append('product_name', currentProduct.name);
                formData.append('price', currentProduct.price);
                formData.append('total_price', (currentProduct.price * quantity).toFixed(2));
                
                const response = await fetch('/cgi-bin/api.sh?action=place_order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`Order placed successfully! Order ID: ${data.order_id}\n\nTotal: $${(currentProduct.price * quantity).toFixed(2)}\n\nThank you for your purchase!`);
                    // Reload product to update stock
                    loadProductDetail(productId);
                } else {
                    alert(data.error || 'Failed to place order');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to place order. Please try again.');
            }
        }

        async function addToCart(productId) {
            const quantity = parseInt(document.getElementById('quantity').value);
            
            const token = localStorage.getItem('token');
            if (!token) {
                if (confirm('Please login to add items to cart. Go to login page?')) {
                    window.location.href = 'login.html';
                }
                return false;
            }

            // Validate quantity
            if (!currentProduct || quantity < 1 || quantity > currentProduct.stock) {
                alert(`Please select a valid quantity (1-${currentProduct.stock})`);
                return false;
            }
            
            try {
                const formData = new URLSearchParams();
                formData.append('token', token);
                formData.append('action', 'add');
                formData.append('product_id', productId);
                formData.append('quantity', quantity);
                
                const response = await fetch('/cgi-bin/api.sh?action=cart_handler', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Update cart count in navbar
                    updateCartCount();
                    
                    // Show success message and ask to view cart
                    if (confirm(`✓ ${currentProduct.name} added to cart!\n\nQuantity: ${quantity}\nPrice: $${(currentProduct.price * quantity).toFixed(2)}\n\nGo to cart now?`)) {
                        window.location.href = 'cart.html';
                    }
                    return true;
                } else {
                    alert('Error: ' + (data.error || 'Failed to add to cart'));
                    return false;
                }
            } catch (error) {
                console.error('Error adding to cart:', error);
                alert('Failed to add to cart. Please try again.');
                return false;
            }
        }
    </script>
</body>
</html>
